name: Terraform Plan and Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - dev

permissions:
  id-token: write   # required for OIDC
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: terraform/environments/dev
  AWS_REGION: eu-central-1
  # Terraform variables — set these in GitHub repository variables / secrets:
  #   vars.APP_ID                  e.g. ops-assistant
  #   vars.BEDROCK_MODEL           e.g. eu.amazon.nova-pro-v1:0
  #   vars.KB_BUCKET_NAME          e.g. ops-assistant-kb
  #   vars.ENABLE_MEMORY           e.g. true
  #   secrets.AGENT_INSTRUCTIONS   the agent system prompt
  TF_VAR_app_id: ${{ vars.APP_ID }}
  TF_VAR_region: eu-central-1
  TF_VAR_model: ${{ vars.BEDROCK_MODEL }}
  TF_VAR_knowledge_base_bucket_name: ${{ vars.KB_BUCKET_NAME }}
  TF_VAR_enable_memory: ${{ vars.ENABLE_MEMORY }}
  TF_VAR_agent_instructions: ${{ secrets.AGENT_INSTRUCTIONS }}

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Resolve backend config from AWS account
        id: backend
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "bucket=${{ vars.APP_ID }}-tfstate-${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"
          echo "dynamodb_table=${{ vars.APP_ID }}-tflocks"        >> "$GITHUB_OUTPUT"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.backend.outputs.bucket }}" \
            -backend-config="key=dev/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ steps.backend.outputs.dynamodb_table }}" \
            -backend-config="encrypt=true"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n\n... (truncated)'
              : plan;

            const body = [
              '## Terraform Plan',
              '',
              '```hcl',
              truncated,
              '```',
              '',
              `**Status:** ${{ steps.plan.outcome == 'success' && '✅ Success' || '❌ Failed' }}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve tfplan
